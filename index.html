<!doctype html>
<html lang="en">
    <head>
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta charset="UTF-8" />
        
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <title>The Microscopic Montado</title>
        <style>

            :root {
                --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
                --bar-h: 58px; 
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                background: #ffffff;
            }
            body {
                overflow: hidden;
                font-family: var(--font-main);
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }

            #app {
                position: fixed;
                inset: 0;
                overflow: hidden;
            }
            #stage {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 200dvh; 
                transform: translateY(0);
                transition: transform 0.75s cubic-bezier(0.76, 0, 0.24, 1);
                will-change: transform;
            }
            #app.at-top #stage {
                transform: translateY(-100dvh); 
            }
            #stage iframe {
                display: block;
                width: 100%;
                height: 100dvh;
                border: 0;
                margin: 0;
            }

            #toggle-bar {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                height: var(--bar-h);
                
                transform: translateY(calc(100dvh - 100%));
                transition:
                    transform 0.75s cubic-bezier(0.76, 0, 0.24, 1),
                    background-color 0.55s ease,
                    color 0.55s ease;
                background: #ffffff;
                color: #111111;
                border: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: clamp(16px, 5vw, 44px);
                cursor: pointer;
                z-index: 10000;
                font-family: var(--font-main);
                box-shadow:
                    0 -1px 0 rgba(0, 0, 0, 0.08),
                    0 -10px 26px rgba(0, 0, 0, 0.05);
                -webkit-tap-highlight-color: transparent;
            }
            #app.at-top #toggle-bar {
                
                transform: translateY(0);
                background: #0a0a0a;
                color: #ffffff;
                box-shadow:
                    0 1px 0 rgba(255, 255, 255, 0.06),
                    0 12px 28px rgba(0, 0, 0, 0.28);
            }

            #toggle-bar .bar-label {
                position: relative;
                display: inline-grid;
            }
            #toggle-bar .bar-label > span {
                grid-area: 1 / 1;
                text-align: center;
                white-space: nowrap;
                font-size: clamp(12px, 2.4vw, 16px);
                letter-spacing: 0.24em;
                text-transform: uppercase;
                font-weight: 500;
                transition: opacity 0.4s ease;
            }
            #toggle-bar .lab-front {
                opacity: 1;
            }
            #toggle-bar .lab-back {
                opacity: 0;
            }
            #app.at-top #toggle-bar .lab-front {
                opacity: 0;
            }
            #app.at-top #toggle-bar .lab-back {
                opacity: 1;
            }

            #toggle-bar .chev {
                width: 15px;
                height: 15px;
                flex: 0 0 auto;
                color: currentColor;
                rotate: 0deg;
                transition: rotate 0.55s cubic-bezier(0.76, 0, 0.24, 1);
                animation: chevBob 1.9s ease-in-out infinite;
            }
            #app.at-top #toggle-bar .chev {
                rotate: 180deg;
            }
            @keyframes chevBob {
                0%,
                100% {
                    translate: 0 -2px;
                }
                50% {
                    translate: 0 2px;
                }
            }
            @media (prefers-reduced-motion: reduce) {
                #toggle-bar .chev {
                    animation: none;
                }
                #stage,
                #toggle-bar {
                    transition-duration: 0.001s;
                }
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div id="stage">
                
                <iframe
                    id="panel-front"
                    src="microscopic.html"
                    title="The Microscopic Montado"
                    scrolling="no"
                ></iframe>
                
                <iframe
                    id="panel-back"
                    src="field-guide.html"
                    title="Field Guide"
                    scrolling="no"
                ></iframe>
            </div>

            <button id="toggle-bar" type="button" aria-label="Toggle page">
                <svg
                    class="chev"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <polyline points="6 15 12 9 18 15" />
                </svg>
                <span class="bar-label">
                    
                    <span class="lab-front">FIELD GUIDE</span>
                    
                    <span class="lab-back">MICROSCOPIC MONTADO</span>
                </span>
                <svg
                    class="chev"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <polyline points="6 15 12 9 18 15" />
                </svg>
            </button>
        </div>

        <script>
            (function () {
                const app = document.getElementById("app");
                const bar = document.getElementById("toggle-bar");
                const stage = document.getElementById("stage");

                // Arriving with #field-guide (e.g. from a detail page's
                // "Continue exploring Field Guide" button): open directly on the
                // lower half (Field Guide), with no slide animation.
                function goFieldGuide(instant) {
                    if (instant) {
                        const st = stage.style.transition;
                        const bt = bar.style.transition;
                        stage.style.transition = "none";
                        bar.style.transition = "none";
                        app.classList.add("at-top");
                        void app.offsetWidth; // force reflow
                        stage.style.transition = st;
                        bar.style.transition = bt;
                    } else {
                        app.classList.add("at-top");
                    }
                }

                if (
                    location.hash === "#field-guide" ||
                    location.hash === "#fieldguide"
                ) {
                    goFieldGuide(true);
                }
                window.addEventListener("hashchange", function () {
                    if (
                        location.hash === "#field-guide" ||
                        location.hash === "#fieldguide"
                    )
                        goFieldGuide(false);
                });

                bar.addEventListener("click", function () {
                    app.classList.toggle("at-top");
                });
            })();
        </script>
    </body>
</html>
