<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>The Microscopic Montado</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Micro+5&family=DotGothic16&display=swap"
            rel="stylesheet"
        />

        <style>
            
            :root {
                
                --dot-x: 47.8%;
                --dot-y: 28.6%;

                --map-aspect: 2;

                
                --ocean: #0b1a2b;
                --beacon: #f5c453;
                --core: #fff4dc;
                --ink: #f3ece0;

                --frame-w: 46px; 
                --frame-h: 30px; 
                --frame-thickness: 3px; 
                --corner: 10px; 
                
                --frame-color: #fff;
                --frame-breathe: 2s; 
                --frame-breathe-scale: 0.7; 

                --click-size: 17px; 

                --cap-font:
                    "Helvetica Neue", Helvetica, Arial, "PingFang SC",
                    sans-serif;
                
                --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
                --font-year:
                    "Micro 5", "DotGothic16", ui-monospace, "Courier New",
                    monospace;

                --cap-color: #111;
                --cap-shadow: 0 1px 2px rgba(255, 255, 255, 0.35);

                --cap-margin-x: 3.3vw; 
                --cap-bottom: 7.7vw; 
                --year-wipe: 0.55s; 

                --legend-right: 3.3vw; 
                --legend-bottom: calc(
                    58px + 16px
                ); 
                --legend-h: clamp(120px, 26vh, 280px); 
                --legend-bar-w: clamp(10px, 2vw, 14px); 
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
                background: #000;
                font-family:
                    "PingFang SC",
                    "Hiragino Sans GB",
                    "Microsoft YaHei",
                    -apple-system,
                    system-ui,
                    sans-serif;
            }

            .map {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: max(100vw, calc(100vh * var(--map-aspect)));
                aspect-ratio: var(--map-aspect) / 1;
                background-color: #000; 
                background-image: url("Images/PlateCarree.png"); 
                background-size: cover; 
                background-position: center;
            }
            .map__video {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                opacity: 0;
                transition: opacity 1.2s ease;
                z-index: 0;
            }

            .marker-frame {
                position: absolute;
                left: var(--dot-x);
                top: var(--dot-y);
                width: var(--frame-w);
                height: var(--frame-h);
                transform: translate(
                    -50%,
                    -50%
                ); 
                pointer-events: none; 
                
                background:
                    linear-gradient(var(--frame-color), var(--frame-color)) left
                        top / var(--corner) var(--frame-thickness) no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color)) left
                        top / var(--frame-thickness) var(--corner) no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color))
                        right top / var(--corner) var(--frame-thickness)
                        no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color))
                        right top / var(--frame-thickness) var(--corner)
                        no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color)) left
                        bottom / var(--corner) var(--frame-thickness) no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color)) left
                        bottom / var(--frame-thickness) var(--corner) no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color))
                        right bottom / var(--corner) var(--frame-thickness)
                        no-repeat,
                    linear-gradient(var(--frame-color), var(--frame-color))
                        right bottom / var(--frame-thickness) var(--corner)
                        no-repeat;
                
                mix-blend-mode: difference;
                animation: frame-breathe var(--frame-breathe) ease-in-out
                    infinite;
            }
            
            @keyframes frame-breathe {
                0%,
                100% {
                    transform: translate(-50%, -50%) scale(1);
                }
                50% {
                    transform: translate(-50%, -50%)
                        scale(var(--frame-breathe-scale));
                }
            }

            .marker-hit {
                position: absolute;
                left: var(--dot-x);
                top: var(--dot-y);
                width: var(--frame-w);
                height: var(--frame-h);
                transform: translate(-50%, -50%);
                padding: 0;
                border: none;
                background: none;
                cursor: pointer;
                z-index: 1;
            }
            .marker-hit .label {
                position: absolute;
                left: 50%;
                bottom: calc(100% + 12px);
                transform: translateX(-50%);
                white-space: nowrap;
                padding: 5px 12px;
                border-radius: 999px;
                font-size: 13px;
                letter-spacing: 0.3px;
                color: var(--ink);
                background: rgba(10, 18, 30, 0.72);
                border: 1px solid rgba(245, 196, 83, 0.4);
                backdrop-filter: blur(6px);
                opacity: 0;
                pointer-events: none;
                transition:
                    opacity 0.25s ease,
                    transform 0.25s ease;
            }
            .marker-hit:hover .label,
            .marker-hit:focus-visible .label {
                opacity: 1;
                transform: translateX(-50%) translateY(-2px);
            }
            .marker-hit:focus-visible {
                outline: 2px solid var(--core);
                outline-offset: 6px;
            }

            .marker-click {
                position: absolute;
                left: var(--dot-x);
                top: var(--dot-y);
                
                transform: translate(-50%, calc(var(--frame-h) / 2 + 10px));
                transform-origin: 50% calc(var(--frame-h) / -2 - 10px);
                pointer-events: none;
                font-family: var(--cap-font);
                font-size: var(--click-size);
                font-weight: 700;
                letter-spacing: 2px;
                text-transform: uppercase;
                white-space: nowrap;
                color: var(--frame-color); 
                mix-blend-mode: difference; 
                animation: click-breathe var(--frame-breathe) ease-in-out
                    infinite;
            }
            
            @keyframes click-breathe {
                0%,
                100% {
                    transform: translate(-50%, calc(var(--frame-h) / 2 + 10px))
                        scale(1);
                }
                50% {
                    transform: translate(-50%, calc(var(--frame-h) / 2 + 10px))
                        scale(var(--frame-breathe-scale));
                }
            }

            .climate-overlay {
                position: fixed;
                inset: 0;
                z-index: 2; 
                pointer-events: none;
                font-family: var(--cap-font);
                color: var(--cap-color);
                opacity: 0; 
                
                transition: opacity 1.2s ease;
            }

            .climate-caption {
                position: absolute;
                left: max(var(--cap-margin-x), env(safe-area-inset-left));
                bottom: max(var(--cap-bottom), env(safe-area-inset-bottom));
            }
            .climate-caption__title {
                left: 0.3em; 
                font-family: var(--font-main);
                font-size: 4vw; 
                font-weight: 400; 
                color: #000000; 
                line-height: 1; 
                letter-spacing: 0em; 
                pointer-events: none;
                user-select: none;
                opacity: 1;
                transition: opacity 0.5s ease;
                line-height: 1.1;
            }
            .climate-caption__sub {
                left: 0.3em; 
                font-family: var(--font-main);
                font-size: 4vw; 
                font-weight: 400; 
                color: #000000; 
                line-height: 1; 
                letter-spacing: 0em; 
                pointer-events: none;
                user-select: none;
                opacity: 1;
                transition: opacity 0.5s ease;
                line-height: 1.1;
                margin-top: 0px;
            }
            .climate-caption__source {
                font-family: var(--font-main);
                font-size: clamp(10px, 1.15vw, 13px);
                font-weight: 400;
                color: #111;
                opacity: 0.8;
                margin-top: 10px;
                max-width: min(92vw, 640px);
                line-height: 1.35;
                text-shadow: var(--cap-shadow);
                pointer-events: none;
                user-select: none;
            }
            .climate-year {
                position: relative; 
                margin-bottom: clamp(
                    28px,
                    6vh,
                    72px
                ); 
                font-family: var(--font-main); 
                font-size: 7vw; 
                line-height: 1;
                font-weight: 400; 
                letter-spacing: 0em; 
                white-space: nowrap;
                height: 1.1em; 
            }
            
            .climate-year .yr {
                position: absolute;
                left: 0;
                bottom: 0; 
                white-space: nowrap;
                opacity: 0; 
            }
            .climate-year .yr.is-front {
                opacity: 1;
                z-index: 1;
            }
            .climate-year .yr.is-wiping {
                opacity: 1;
                z-index: 2; 
                animation: year-wipe var(--year-wipe) ease forwards;
            }
            @keyframes year-wipe {
                from {
                    clip-path: inset(0 0 0 0);
                }
                to {
                    clip-path: inset(0 0 0 100%);
                }
            }

            .legend {
                position: absolute;
                right: max(var(--legend-right), env(safe-area-inset-right));
                bottom: max(var(--legend-bottom), env(safe-area-inset-bottom));
                color: var(--cap-color);

                font-variant-numeric: tabular-nums;
            }
            
            .legend__unit {
                font-size: clamp(10px, 1vw, 13px);
                opacity: 0.85;
                text-align: right;
                margin-bottom: 2px;
            }
            
            .legend__scale {
                display: flex;
                align-items: stretch; 
                gap: 7px;
            }
            .legend__bar {
                width: var(--legend-bar-w);
                height: var(--legend-h);
                border-radius: 2px;
                box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
            }
            
            .legend__bar--temp {
                background: linear-gradient(
                    to top,
                    #053061 0%,
                    #2166ac 10%,
                    #4393c3 20%,
                    #92c5de 30%,
                    #d1e5f0 40%,
                    #f7f7f7 50%,
                    #fddbc7 60%,
                    #f4a582 70%,
                    #d6604d 80%,
                    #b2182b 90%,
                    #67001f 100%
                );
            }
            
            .legend__bar--ndvi {
                background: linear-gradient(
                    to top,
                    #543005 0%,
                    #8c510a 10%,
                    #bf812d 20%,
                    #dfc27d 30%,
                    #f6e8c3 40%,
                    #f5f5f5 50%,
                    #c7eae5 60%,
                    #80cdc1 70%,
                    #35978f 80%,
                    #01665e 90%,
                    #003c30 100%
                );
            }
            
            .legend__ticks {
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                font-size: clamp(10px, 1vw, 13px);
                line-height: 1;
            }

            .exit-overlay {
                position: fixed;
                inset: 0;
                background: #000;
                opacity: 0;
                z-index: 9999;
                pointer-events: none;
                transition: opacity 0.7s ease;
            }
            .exit-overlay.active {
                opacity: 1;
            }

            @media (prefers-reduced-motion: reduce) {
                .marker-frame {
                    animation: none;
                    transition: none !important;
                }
                .marker-click {
                    animation: none;
                    transition: none !important;
                }
                .map__video {
                    transition: none !important;
                }
                .exit-overlay {
                    transition: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="site-nav"></div>
        <script src="nav.js"></script>

        <div class="exit-overlay" id="exitOverlay"></div>

        <div class="map">
            <video
                class="map__video"
                id="bgVid0"
                muted
                playsinline
                preload="auto"
            ></video>
            <video
                class="map__video"
                id="bgVid1"
                muted
                playsinline
                preload="auto"
            ></video>

            <div class="marker-click" id="markerClick" aria-hidden="true">
                Portugal · Alentejo
            </div>

            <div class="marker-frame" id="markerFrame" aria-hidden="true"></div>

            <button
                class="marker-hit"
                id="worldBeacon"
                aria-label="Enter the Alentejo region"
            >
            </button>
        </div>

        <div class="climate-overlay" id="climateOverlay">
            <div class="climate-caption">
                <div class="climate-year" id="climateYear" aria-hidden="true">
                    <span class="yr"></span>
                    <span class="yr"></span>
                </div>
                <div class="climate-caption__title" id="capTitle"></div>
                <div class="climate-caption__sub" id="capSub"></div>
                <div class="climate-caption__source" id="capSource"></div>
            </div>

            <div class="legend" id="legendTemp">
                <div class="legend__unit">°C</div>
                <div class="legend__scale">
                    <div class="legend__bar legend__bar--temp"></div>
                    <div class="legend__ticks">
                        <span>3</span><span>2</span><span>1</span><span>0</span
                        ><span>-1</span><span>-2</span><span>-3</span>
                    </div>
                </div>
            </div>
            <div class="legend" id="legendNdvi" style="display: none">
                <div class="legend__unit">NDVI</div>
                <div class="legend__scale">
                    <div class="legend__bar legend__bar--ndvi"></div>
                    <div class="legend__ticks">
                        <span>+0.10</span><span>+0.05</span><span>0</span
                        ><span>-0.05</span><span>-0.10</span>
                    </div>
                </div>
            </div>
        </div>

        <script>

            

            
            var VIDEOS = [
                {
                    src: "videos/PlateCarree_temp_anomaly_web",
                    title: "Temperature Anomaly",
                    subtitle:
                        "How much warmer or cooler<br>than the 1951–1980 average",
                    years: ["1986-1995", "1996-2005", "2006-2015", "2016-2025"],
                    legend: "temp",
                    source:
                        "Data: Berkeley Earth, gridded land + ocean temperature (CC BY-NC 4.0)",
                },
                {
                    src: "videos/ndvi_anomaly_web",
                    title: "Vegetation Change",
                    subtitle:
                        "Where plant cover grew denser or thinned out<br>than the 1982–1990 average",
                    years: ["1991-2000", "2001-2010", "2011-2020", "2021-2022"],
                    legend: "ndvi",
                    source:
                        "Data: NASA GIMMS NDVI3g+ (AVHRR), NASA / ORNL DAAC · doi:10.3334/ORNLDAAC/2187",
                },
            ];
            var BG_VIDEOS = VIDEOS.map(function (x) {
                return x.src;
            });

            var CAN_WEBM = !!document
                .createElement("video")
                .canPlayType('video/webm; codecs="vp9, vp8"');
            function pickSrc(base) {
                return base + (CAN_WEBM ? ".webm" : ".mp4");
            }
            var FADE_MS = 1200; 
            var BLACK_MS = 400; 

            var bgSlots = [
                document.getElementById("bgVid0"),
                document.getElementById("bgVid1"),
            ];
            var activeSlot = 0;
            var nextVidIdx = 1 % BG_VIDEOS.length;

            bgSlots.forEach(function (v) {
                v.addEventListener("ended", onBgEnded);
            });

            (function initBg() {
                bgSlots[0].src = pickSrc(BG_VIDEOS[0]);
                fadeInOnPlay(bgSlots[0], bgSlots[0].play());
                bgSlots[1].src = pickSrc(BG_VIDEOS[1 % BG_VIDEOS.length]);
                bgSlots[1].load();
            })();

            function fadeInOnPlay(v, promise) {
                function doFadeIn() {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            v.style.opacity = "1";
                            
                            applyVideoMeta(vidIndexOf(v));
                            fadeOverlay(true);
                            
                        });
                    });
                }
                if (promise && typeof promise.then === "function") {
                    promise.then(doFadeIn).catch(doFadeIn);
                } else {
                    doFadeIn();
                }
            }

            function onBgEnded() {
                var outSlot = activeSlot;
                var inSlot = 1 - activeSlot;
                var inVidIdx = nextVidIdx;
                var afterNext = (inVidIdx + 1) % BG_VIDEOS.length;

                bgSlots[outSlot].style.opacity = "0";
                fadeOverlay(false); 
                setTimeout(function () {
                    var v = bgSlots[inSlot];
                    v.currentTime = 0;
                    fadeInOnPlay(v, v.play());
                    activeSlot = inSlot;
                    nextVidIdx = afterNext;
                    bgSlots[outSlot].src = pickSrc(BG_VIDEOS[afterNext]);
                    bgSlots[outSlot].load();
                }, FADE_MS + BLACK_MS);
            }

            
            
            var climateOverlay = document.getElementById("climateOverlay");
            var climateYearEl = document.getElementById("climateYear");
            var yearLayers = climateYearEl.querySelectorAll(".yr");
            var yearFront = 0; 
            var capTitleEl = document.getElementById("capTitle");
            var capSubEl = document.getElementById("capSub");
            var capSourceEl = document.getElementById("capSource");
            var legendEls = {
                temp: document.getElementById("legendTemp"),
                ndvi: document.getElementById("legendNdvi"),
            };
            var currentVidIdx = -1;
            var lastQuarter = -1;

            function vidIndexOf(v) {
                if (!v || !v.src) return -1;
                for (var i = 0; i < BG_VIDEOS.length; i++) {
                    if (v.src.indexOf(BG_VIDEOS[i]) !== -1) return i;
                }
                return -1;
            }

            function applyVideoMeta(idx) {
                currentVidIdx = idx;
                lastQuarter = -1;
                var meta = VIDEOS[idx];
                if (!meta) return;
                capTitleEl.textContent = meta.title;
                capSubEl.innerHTML = meta.subtitle;
                if (capSourceEl) capSourceEl.innerHTML = meta.source || "";

                lastQuarter = 0;
                setYearInstant(meta.years[0]);
                
                for (var key in legendEls) {
                    if (legendEls[key]) {
                        legendEls[key].style.display =
                            key === meta.legend ? "" : "none";
                    }
                }
            }

            function fadeOverlay(on) {
                climateOverlay.style.opacity = on ? "1" : "0";
            }

            
            var YEAR_WIPE_MS = 550; 

            function setYearInstant(text) {
                var f = yearFront;
                var fEl = yearLayers[f];
                var bEl = yearLayers[1 - f];
                fEl.textContent = text;
                fEl.classList.remove("is-wiping");
                fEl.classList.add("is-front");
                bEl.classList.remove("is-front", "is-wiping");
            }

            function showYear(text) {
                var f = yearFront;
                var b = 1 - f;
                var outEl = yearLayers[f]; 
                var inEl = yearLayers[b]; 
                inEl.textContent = text;
                inEl.classList.remove("is-wiping");
                inEl.classList.add("is-front");
                outEl.classList.remove("is-front", "is-wiping");
                void climateYearEl.offsetWidth; 
                outEl.classList.add("is-wiping");
                yearFront = b;
                
                setTimeout(function () {
                    outEl.classList.remove("is-wiping");
                }, YEAR_WIPE_MS);
            }

            function onCaptionTimeUpdate(e) {
                var v = e.target;
                if (v !== bgSlots[activeSlot]) return; 
                var meta = VIDEOS[currentVidIdx];
                if (!meta) return;

                var dur = v.duration;
                if (!dur || isNaN(dur) || !isFinite(dur)) return;

                var q = Math.floor((v.currentTime / dur) * 4);
                if (q > 3) q = 3;
                if (q < 0) q = 0;
                if (q !== lastQuarter) {
                    lastQuarter = q;
                    showYear(meta.years[q]);
                }
            }

            bgSlots.forEach(function (v) {
                v.addEventListener("timeupdate", onCaptionTimeUpdate);
            });

            var worldBeacon = document.getElementById("worldBeacon");
            var exitOverlay = document.getElementById("exitOverlay");
            var navigating = false;

            worldBeacon.addEventListener("click", function () {
                if (navigating) return;
                navigating = true;

                var r = worldBeacon.getBoundingClientRect();
                var ox = Math.round(r.left + r.width / 2);
                var oy = Math.round(r.top + r.height / 2);

                exitOverlay.classList.add("active");

                setTimeout(function () {
                    window.location.href =
                        "montado.html?ox=" + ox + "&oy=" + oy;
                }, 700);
            });
        </script>
        <script>

            

            (function () {
                
                var MAP = { west: -180, east: 180, north: 90, south: -90 };
                
                var TARGET_LON = -7.92;
                var TARGET_LAT = 38.52;
                
                var FALLBACK_ASPECT = 2;

                var mapEl = document.querySelector(".map");
                var slots = [
                    document.getElementById("bgVid0"),
                    document.getElementById("bgVid1"),
                ];

                var cx = (TARGET_LON - MAP.west) / (MAP.east - MAP.west);
                var cy = (MAP.north - TARGET_LAT) / (MAP.north - MAP.south);

                function videoAspect() {
                    for (var i = 0; i < slots.length; i++) {
                        var v = slots[i];
                        if (v && v.videoWidth && v.videoHeight)
                            return v.videoWidth / v.videoHeight;
                    }
                    return FALLBACK_ASPECT;
                }

                
                function positionMarker() {
                    if (!mapEl) return;
                    var mw = mapEl.clientWidth,
                        mh = mapEl.clientHeight;
                    if (!mw || !mh) return;
                    var A = videoAspect();
                    var rW, rH;
                    if (A > mw / mh) {
                        
                        rH = mh;
                        rW = mh * A;
                    } else {
                        
                        rW = mw;
                        rH = mw / A;
                    }
                    var x = cx * rW - (rW - mw) / 2;
                    var y = cy * rH - (rH - mh) / 2;
                    var root = document.documentElement.style;
                    root.setProperty("--dot-x", (x / mw) * 100 + "%");
                    root.setProperty("--dot-y", (y / mh) * 100 + "%");
                }

                positionMarker();
                window.addEventListener("resize", positionMarker);
                window.addEventListener("orientationchange", positionMarker);
                slots.forEach(function (v) {
                    if (v) v.addEventListener("loadedmetadata", positionMarker);
                });
            })();
        </script>
    </body>
</html>
